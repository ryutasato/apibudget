services:
  apibudget:
    build: .
    ports:
      - "8080:8080"
    environment:
      APIBUDGET_STORE_TYPE: redis
      APIBUDGET_REDIS_ADDR: redis:6379
      APIBUDGET_LOG_LEVEL: info
    volumes:
      - ./apibudget.yaml:/etc/apibudget/apibudget.yaml:ro
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
