run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - misspell
    - gofmt

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
    disable:
      - fieldalignment
  misspell:
    locale: US
    ignore-words:
      - cancelled
      - Cancelled

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
